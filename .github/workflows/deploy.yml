name: Deploy to CapRover

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get CapRover token
        id: auth
        run: |
          RESPONSE=$(curl -s -L -X POST http://95.182.100.126:3000/api/v2/login \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${{ secrets.CAPROVER_PASSWORD }}\"}")
          TOKEN=$(echo $RESPONSE | jq -r '.data.token // empty')
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then exit 1; fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Package and Deploy Backend
        run: |
          # Создаем конфиг в корне
          echo '{"schemaVersion":2,"dockerfilePath":"Dockerfile.backend"}' > captain-definition
          
          # Упаковываем только нужное без префиксов ./
          tar -czf /tmp/backend.tar.gz \
            api \
            lib \
            server.js \
            package.json \
            package-lock.json \
            Dockerfile.backend \
            captain-definition
            
          curl -X POST http://95.182.100.126:3000/api/v2/user/apps/appData/riri-be-dev \
            -H "x-captain-auth: ${{ steps.auth.outputs.token }}" \
            -F "sourceFile=@/tmp/backend.tar.gz"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: |
          npm run build

      - name: Prepare and Package Frontend
        run: |
          # 1. Создаем конфиг в корне
          echo '{"schemaVersion":2,"dockerfilePath":"Dockerfile.frontend"}' > captain-definition
          
          # 2. Упаковываем файлы ЯВНО перечисляя их (это уберет ./ из путей)
          tar -czf /tmp/frontend.tar.gz \
            dist \
            nginx.conf \
            Dockerfile.frontend \
            captain-definition
          
          # 3. Диагностика (теперь путей с ./ быть не должно)
          echo "📂 Final archive structure:"
          tar -tf /tmp/frontend.tar.gz

      - name: Get CapRover token
        id: auth
        run: |
          RESPONSE=$(curl -s -L -X POST http://95.182.100.126:3000/api/v2/login \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${{ secrets.CAPROVER_PASSWORD }}\"}")
          TOKEN=$(echo $RESPONSE | jq -r '.data.token // empty')
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then exit 1; fi
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy frontend to CapRover
        run: |
          curl -X POST http://95.182.100.126:3000/api/v2/user/apps/appData/riri-fe-dev \
            -H "x-captain-auth: ${{ steps.auth.outputs.token }}" \
            -F "sourceFile=@/tmp/frontend.tar.gz"
